# =========================================================
# PromptAudit v2.0 configuration
# Binary SAFE/VULNERABLE classification settings
#
# This file defines:
#   - Default generation settings used by the runner / GUI
#   - Available models (Ollama, HF, API)
#   - Prompt strategies
#   - Datasets
#   - Report + CSV output locations
# =========================================================

# ---------------------------------------------------------
# Debug / Logging Flags
# ---------------------------------------------------------
debug_raw_outputs: false  # Enable only when diagnosing prompt/output issues; it slows long runs and floods logs

# ---------------------------------------------------------
# Performance Controls
# These reduce avoidable overhead in long runs without
# changing the underlying model outputs.
# ---------------------------------------------------------
performance:
  # Reuse backend objects across prompt/protocol/parser combos
  # within a single run. This especially helps HF models.
  cache_models: true

  # Prompt objects are lightweight, but caching avoids repeated imports.
  cache_prompts: true

  # Checkpoint progress periodically instead of rewriting checkpoint.json
  # after every sample.
  checkpoint_every_n_samples: 10
  checkpoint_every_seconds: 15.0

  # Throttle GUI/log progress updates on large runs.
  progress_every_n_samples: 10

  # Keep the machine awake while an active run is executing.
  # On Windows this prevents system sleep; the display may still sleep
  # unless keep_display_awake is also enabled.
  prevent_system_sleep: true
  keep_display_awake: false

  # Optional pacing between self-consistency votes.
  # Keep at 0 locally unless a backend needs throttling.
  sc_vote_delay_seconds: 0.0

  # Ask Ollama to keep loaded models warm between requests/combos.
  # This can reduce repeated model load latency on long local runs.
  ollama_keep_alive: 30m

# ---------------------------------------------------------
# Generation Configuration
# These defaults are loaded at startup and then copied into
# the runner. The GUI can override these values at runtime.
# ---------------------------------------------------------
generation:
  # Controls randomness of the model output.
  # Lower values (0.1-0.3) are more deterministic and stable.
  temperature: 0.2

  # Nucleus sampling: the model only samples from the top-p
  # cumulative probability mass. 0.9 is a common default.
  top_p: 0.9

  # Top-k sampling: restricts sampling to the k most likely
  # next tokens. 40 is a conservative default.
  top_k: 40

  # Maximum number of new tokens the model is allowed to
  # generate. This limits answer length.
  max_new_tokens: 250

  # Penalizes repeated tokens; > 1.0 pushes the model away
  # from repeating itself. 1.0 = no penalty.
  repetition_penalty: 1.0

  # API-only option (ignored by most local backends):
  # penalizes frequent tokens to diversify output.
  frequency_penalty: 0.0

  # API-only option (ignored by most local backends):
  # penalizes tokens already present in the context.
  presence_penalty: 0.0

  # Beam search width for HF models. 1 = no beam search
  # (pure sampling / greedy).
  num_beams: 1

  # Number of self-consistency samples (used by the
  # self_consistency prompt strategy). The strategy decides
  # how to aggregate these.
  sc_samples: 5

  # Seed for reproducibility. Not all backends respect this,
  # but when honored it helps make runs repeatable.
  seed: 42

  # Stop sequences passed to the backend by default.
  # NOTE:
  #   - The current runner logic may override this for some
  #     SAFE/VULNERABLE pipelines (for example, using "\n").
  #   - Leaving this empty here keeps the YAML neutral and
  #     backend-agnostic.
  stop_sequences: []

  # Optional experiment label shown in logs / report footer.
  experiment_name: "Default Run"

  # Optional free-form notes for this configuration.
  experiment_notes: ""

# ---------------------------------------------------------
# Output Configuration
# Controls where experiment results are written on disk.
# Paths are relative to the project root.
# ---------------------------------------------------------
output:
  # Master metrics CSV (one row per dataset x model x prompt).
  results_csv: results/csv/metrics.csv

  # Interactive HTML report (charts, tables, filters).
  report_html: results/report.html

  # Each run gets its own timestamped artifact folder under this root.
  run_root: results/runs

# ---------------------------------------------------------
# Model Definitions
# Each entry describes one model that can be selected in
# the GUI. "name" must match the actual Ollama tag or
# HF model id, and "backend" controls which loader is used.
# ---------------------------------------------------------
models:
  # Local Ollama models used in the paper's controlled study.
  - name: mistral:latest
    backend: ollama

  - name: gemma:7b
    backend: ollama

  - name: codellama:7b-instruct
    backend: ollama

  # Use the instruct variant to align with system-style prompts.
  - name: falcon:7b-instruct
    backend: ollama

  - name: deepseek-coder:6.7b-instruct
    backend: ollama

# ---------------------------------------------------------
# Prompt Strategies
# Each string here maps to a prompt implementation under
# prompts/ (for example, prompts/zero_shot.py, prompts/cot.py).
# These show up as selectable strategies in the GUI.
# ---------------------------------------------------------
prompts:
  - zero_shot         # Single-pass classification, no examples
  - few_shot          # Uses small labeled examples in the prompt
  - cot               # Chain-of-thought style reasoning
  - adaptive_cot      # Chooses when to use CoT based on context
  - self_consistency  # Multiple sampled chains with voting
  - self_verification # Adds a self-check step before the final verdict

# ---------------------------------------------------------
# Ablation Controls
# These define which protocol/parser variants the GUI can
# expose and which ones are selected by default.
# ---------------------------------------------------------
ablations:
  available_output_protocols: [verdict_first, verdict_last]
  default_output_protocols: [verdict_first]
  available_parser_modes: [strict, structured, full]
  default_parser_modes: [full]

# ---------------------------------------------------------
# Datasets
# Each dataset name corresponds to a loader in
# code_datasets/dataset_loader.py (for example, "toy", "cvefixes").
# ---------------------------------------------------------
datasets:
  # Small mixed-language function-level dataset for smoke tests and demos.
  - name: toy
    source: local
    path: data/toy.csv

  # Local dataset pointing to CVE code files.
  - name: cvefixes_local
    source: local
    path: data/CVE_Dataset/cve_code_files/

  - name: cvefixes_50
    source: local
    path: data/cve_code_50/

  - name: cvefixes_100
    source: local
    path: data/cve_code_100/

  - name: cvefixes_500
    source: local
    path: data/cve_code_500/

  - name: cvefixes_1000
    source: local
    path: data/cve_code_1000/

  # Hugging Face-backed datasets (loaded by name in the loader).
  - name: bigvul
    source: hf

  - name: vul4j
    source: hf

# ---------------------------------------------------------
# Metrics
# Controls which aggregate metrics are included in the
# CSV and HTML reports. Under the hood, Metrics.to_dict()
# must provide these keys.
# ---------------------------------------------------------
metrics:
  include: ["Accuracy", "Precision", "Recall", "F1", "Coverage", "AbstentionRate", "EffectiveF1"]

# ---------------------------------------------------------
# API Configuration (Optional)
# Only used if an external API backend is wired up in
# models/model_loader.py (for example, OpenAI or other providers).
# ---------------------------------------------------------
api:
  api_host: https://api.openai.com
  # API key intentionally left blank; expected to be supplied
  # via environment variable or secure secrets mechanism.
  api_key: ""
